name: Build and Push to Amazon ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 729017845242.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: alice/iar-test
  IMAGE_TAG: alice-test-web-nodejs-v${{ github.run_number }}.${{ github.run_attempt }}
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        if: env.AWS_ROLE_TO_ASSUME != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials with access keys
        if: env.AWS_ROLE_TO_ASSUME == ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Print pushed image
        run: echo "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

      - name: Scan pushed image with CrowdStrike FCS
        id: fcs-image-scan
        uses: crowdstrike/fcs-action@v4.0.1
        with:
          falcon_client_id: ${{ vars.FALCON_CLIENT_ID }}
          falcon_region: ${{ vars.FALCON_REGION || 'us-1' }}
          scan_type: image
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          platform: linux/amd64
          report_formats: json
          output_path: ./fcs-image-scan-results.json
          upload_results: true
        env:
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}

      - name: Print FCS scan exit code
        if: always()
        run: |
          echo "FCS scan exit code: ${{ steps.fcs-image-scan.outputs.exit-code }}"

      - name: Upload FCS scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fcs-image-scan-results
          path: ./fcs-image-scan-results.json
          if-no-files-found: warn
